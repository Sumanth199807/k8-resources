apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels: 
    project: roboshop
    environment: dev

spec:
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      port: 80
      targetport: 80

-----
apiVersion: v1
kind: pod
metadata: 
   name: nginx
   labels:
     project: roboshop
     environment: dev
     component: frontend
     tier: frontend
spec:
  containers: 
    - name: nginx
      image: nginx